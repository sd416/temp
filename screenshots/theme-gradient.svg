<svg width="480" height="160" viewBox="0 0 480 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradBg" x1="0" y1="0" x2="480" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="var(--g1)"/>
      <stop offset="100%" stop-color="var(--g2)"/>
    </linearGradient>
    <linearGradient id="hGrad" x1="0" y1="0" x2="100%" y2="0">
      <stop offset="0%" stop-color="var(--bar-from)"/>
      <stop offset="100%" stop-color="var(--bar-to)"/>
    </linearGradient>
    <style>
      :root {
        --g1: #0f0c29; --g2: #1a1a40; --text-p: #f0f0ff; --text-s: #8888aa;
        --brd: #2e2e5a; --bar-from: #00d2ff; --bar-to: #7b2ff7;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --g1: #f8f9ff; --g2: #eef0ff; --text-p: #1a1a2e; --text-s: #6c6c8a;
          --brd: #d4d4f0; --bar-from: #3b82f6; --bar-to: #8b5cf6;
        }
      }
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect width="480" height="160" rx="12" fill="url(#gradBg)"/>
  <rect x="0.5" y="0.5" width="479" height="159" rx="11.5" stroke="var(--brd)" fill="none"/>

  <g transform="translate(25, 18)">
    <text class="sans" font-size="10" font-weight="600" fill="var(--bar-to)" letter-spacing="0.5">WEBSITE TRAFFIC</text>
  </g>

  <g transform="translate(25, 62)">
    <text class="sans" font-size="38" font-weight="800" fill="var(--text-p)">144.6K</text>
    <text y="20" class="sans" font-size="10" fill="var(--text-s)">last 7 days</text>
  </g>

  <g transform="translate(240, 18)">
    <text x="0" y="9" class="sans" font-size="8" fill="var(--text-s)">Tue</text>
      <rect x="28" y="0" width="59.6" height="10" rx="4" fill="url(#hGrad)" opacity="0.50"/>
      <text x="92.6" y="9" class="sans" font-size="7" fill="var(--text-s)">12.4K</text>
      <text x="0" y="26" class="sans" font-size="8" fill="var(--text-s)">Wed</text>
      <rect x="28" y="17" width="87.5" height="10" rx="4" fill="url(#hGrad)" opacity="0.58"/>
      <text x="120.5" y="26" class="sans" font-size="7" fill="var(--text-s)">18.2K</text>
      <text x="0" y="43" class="sans" font-size="8" fill="var(--text-s)">Thu</text>
      <rect x="28" y="34" width="73.6" height="10" rx="4" fill="url(#hGrad)" opacity="0.67"/>
      <text x="106.6" y="43" class="sans" font-size="7" fill="var(--text-s)">15.3K</text>
      <text x="0" y="60" class="sans" font-size="8" fill="var(--text-s)">Fri</text>
      <rect x="28" y="51" width="106.3" height="10" rx="4" fill="url(#hGrad)" opacity="0.75"/>
      <text x="139.3" y="60" class="sans" font-size="7" fill="var(--text-s)">22.1K</text>
      <text x="0" y="77" class="sans" font-size="8" fill="var(--text-s)">Sat</text>
      <rect x="28" y="68" width="95.2" height="10" rx="4" fill="url(#hGrad)" opacity="0.83"/>
      <text x="128.2" y="77" class="sans" font-size="7" fill="var(--text-s)">19.8K</text>
      <text x="0" y="94" class="sans" font-size="8" fill="var(--text-s)">Sun</text>
      <rect x="28" y="85" width="123.1" height="10" rx="4" fill="url(#hGrad)" opacity="0.92"/>
      <text x="156.1" y="94" class="sans" font-size="7" fill="var(--text-s)">25.6K</text>
      <text x="0" y="111" class="sans" font-size="8" fill="var(--text-s)">Mon</text>
      <rect x="28" y="102" width="150.0" height="10" rx="4" fill="url(#hGrad)" opacity="1.00"/>
      <text x="183.0" y="111" class="sans" font-size="7" fill="var(--text-s)">31.2K</text>
  </g>

  <g transform="translate(25, 150)">
    <text class="sans" font-size="9" fill="var(--text-s)">Edge Analytics // Global CDN</text>
  </g>

  <circle cx="455" cy="20" r="4" fill="var(--bar-to)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>