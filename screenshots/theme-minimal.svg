<svg width="480" height="160" viewBox="0 0 480 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="100%">
      <stop offset="0%" stop-color="var(--line)"/>
      <stop offset="100%" stop-color="var(--line)" stop-opacity="0"/>
    </linearGradient>
    <style>
      :root { --bg: #ffffff; --text-p: #1a1a2e; --text-s: #6c6c8a; --brd: #e2e2f0; --line: #10b981; }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #1a1a2e; --text-p: #e2e2f0; --text-s: #9999b3; --brd: #2d2d4a; --line: #34d399; }
      }
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect width="480" height="160" rx="12" fill="var(--bg)"/>
  <rect x="0.5" y="0.5" width="479" height="159" rx="11.5" stroke="var(--brd)" fill="none"/>

  <g transform="translate(25, 22)">
    <text class="sans" font-size="11" font-weight="600" fill="var(--line)" letter-spacing="1">WEBSITE TRAFFIC</text>
    <text y="26" class="sans" font-size="30" font-weight="700" fill="var(--text-p)">144.6K</text>
    <text y="42" class="sans" font-size="10" fill="var(--text-s)">last 7 days</text>
  </g>

  <g transform="translate(25, 75)">
    <polygon points="0.0,60.0 71.7,43.0 143.3,51.5 215.0,31.6 286.7,38.4 358.3,21.4 430.0,5.0 430.0,65.0 0.0,65.0" fill="url(#areaFill)" opacity="0.3"/>
    <polyline points="0.0,60.0 71.7,43.0 143.3,51.5 215.0,31.6 286.7,38.4 358.3,21.4 430.0,5.0" fill="none" stroke="var(--line)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(25, 152)">
    <text class="sans" font-size="9" fill="var(--text-s)">Cloudflare Analytics // updated hourly</text>
  </g>
</svg>